<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlaraPure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #87CEEB;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- PAGES --- */
        #page1 {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('./src/assets/page1.png');
            background-size: cover;
            background-position: center;
            z-index: 3;
            transition: opacity 1.5s ease-in-out;
        }

        #page2 {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('./src/assets/page2.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .hidden { 
            opacity: 0 !important; 
            pointer-events: none; 
        }

        .visible { 
            opacity: 1 !important; 
            pointer-events: all; 
        }

        /* --- LA LIGNE QUI RESPIRE ET ONDULE --- */
        #wave-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            height: 220px;
            display: none;
            z-index: 10;
        }

        #wave-svg {
            width: 100%;
            height: 100%;
        }

        #wave-line {
            fill: none;
            stroke-linecap: round;
            stroke-width: 3;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="page1"></div>
    <div id="page2" class="hidden">
        <div id="wave-container">
            <svg id="wave-svg" viewBox="0 0 800 220">
                <path id="wave-line" d=""></path>
            </svg>
        </div>
    </div>
</div>

<script>
    const waveLine = document.getElementById('wave-line');
    const width = 800;
    const height = 220;
    const segments = 100; // Lissage parfait

    let intensity = 0.4; 
    let targetIntensity = 0.4;

    function drawWave(time) {
        // 1. FORME ET MOUVEMENT : Riche, fluide et ondulé
        const amplitude = 8 + (intensity * 45); 

        // 2. COULEUR : BLEU CIEL PAR DEFAUT. ROUGE SEULEMENT SI > 1.4
        let color;
        if (intensity > 1.4) {
            color = `rgb(255, 45, 75)`; // ROUGEÂTRE / AGRESSIF
        } else {
            color = `rgb(135, 206, 235)`; // BLEU CIEL DOUX
        }

        waveLine.setAttribute('stroke', color);
        waveLine.setAttribute('filter', `drop-shadow(0 0 ${5 * intensity}px ${color})`);

        // 3. DESSIN DE L'ONDE COMPLEXE (Style "Vague qui respire")
        let pathData = `M 0 ${height/2}`;
        for(let i = 0; i <= segments; i++) {
            const x = (i / segments) * width;
            // Mélange de 3 fréquences pour un rendu organique et subtil
            const y = Math.sin((i * 0.25) + (time * 0.0006)) * amplitude 
                    + Math.sin((i * 0.6) + (time * 0.0012)) * (amplitude * 0.5)
                    + Math.sin((i * 1.8) + (time * 0.003)) * (amplitude * 0.15)
                    + height / 2;
            pathData += ` L ${x} ${y}`;
        }
        waveLine.setAttribute('d', pathData);

        // Transition ultra douce
        intensity += (targetIntensity - intensity) * 0.04;
    }

    function simulateSoundEnergy() {
        targetIntensity = 0.2 + Math.random() * 0.7; 
        setTimeout(simulateSoundEnergy, 700 + Math.random() * 900);
    }

    let animationId;
    function animate() {
        drawWave(Date.now());
        animationId = requestAnimationFrame(animate);
    }

    // --- CONFIGURATION DES LANGUES ---
    function getAudioFile(lang) {
        switch(lang) {
            case 'en': return './voice_fr.mp3';   // ANGLAIS → FRANCAIS
            case 'fr': return './voice_fr.mp3';   // FRANCAIS → FRANCAIS
            case 'es': return './voice_es.mp3';   // ESPAGNOL → ESPAGNOL
            case 'it': return './voice_es.mp3';   // ITALIEN → ESPAGNOL
            default: return './voice_fr.mp3';
        }
    }

    let currentAudio = null;

    function startApp(lang) {
        console.log("Demarrage : " + lang);
        
        document.getElementById('page1').classList.add('hidden');
        document.getElementById('page2').classList.add('visible');
        document.getElementById('wave-container').style.display = 'block';
        
        animate();
        simulateSoundEnergy();

        if(currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        currentAudio = new Audio(getAudioFile(lang));
        currentAudio.play();

        currentAudio.onended = function() {
            document.getElementById('wave-container').style.display = 'none';
            cancelAnimationFrame(animationId);
        };
    }

    // ZONES DE CLIC
    document.getElementById('page1').addEventListener('click', function(e) {
        const x = e.clientX;
        const w = window.innerWidth;

        if (x < w * 0.25) { 
            startApp('en'); 
        } else if (x < w * 0.50) { 
            startApp('fr'); 
        } else if (x < w * 0.75) { 
            startApp('es'); 
        } else { 
            startApp('it'); 
        }
    });

</script>

</body>
</html>
