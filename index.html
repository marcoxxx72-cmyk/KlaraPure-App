<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klara Pure Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        .interface-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background-image: url('design/background.png');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .content-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            min-width: 60%;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .lang-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: white;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
        }

        .lang-btn:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .lang-btn img {
            width: 24px;
            height: auto;
        }

        /* --- Styles des Ondes --- */
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 60px;
            margin-top: 20px;
            transition: opacity 0.3s ease;
        }

        .wave-bar {
            width: 5px;
            background: #87CEEB; /* Bleu ciel */
            border-radius: 3px;
            opacity: 0.8;
        }

        .animate-wave-1 { animation: wave 1.2s infinite ease-in-out; }
        .animate-wave-2 { animation: wave 1.3s infinite ease-in-out; }
        .animate-wave-3 { animation: wave 1.1s infinite ease-in-out; }
        .animate-wave-4 { animation: wave 1.4s infinite ease-in-out; }
        .animate-wave-5 { animation: wave 1.0s infinite ease-in-out; }
        .animate-wave-6 { animation: wave 1.5s infinite ease-in-out; }
        .animate-wave-7 { animation: wave 0.9s infinite ease-in-out; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.2); }
            50% { transform: scaleY(1); }
        }
    </style>
</head>
<body>

<div class="interface-container">
    <div class="content-box">
        <div class="title">Klara Pure ©</div>
        <div class="subtitle">Voice Engine v7.0</div>

        <div class="lang-buttons">
            <button class="lang-btn" onclick="playAudio('en')">
                <img src="https://flagcdn.com/w40/gb.png" alt="EN"> EN
            </button>
            <button class="lang-btn" onclick="playAudio('fr')">
                <img src="https://flagcdn.com/w40/fr.png" alt="FR"> FR
            </button>
            <button class="lang-btn" onclick="playAudio('es')">
                <img src="https://flagcdn.com/w40/es.png" alt="ES"> ES
            </button>
            <button class="lang-btn" onclick="playAudio('it')">
                <img src="https://flagcdn.com/w40/it.png" alt="IT"> IT
            </button>
        </div>

        <!-- Les ondes animées -->
        <div class="wave-container" id="waveVisualizer">
            <div class="wave-bar animate-wave-1"></div>
            <div class="wave-bar animate-wave-2"></div>
            <div class="wave-bar animate-wave-3"></div>
            <div class="wave-bar animate-wave-4"></div>
            <div class="wave-bar animate-wave-5"></div>
            <div class="wave-bar animate-wave-6"></div>
            <div class="wave-bar animate-wave-7"></div>
            <div class="wave-bar animate-wave-5"></div>
            <div class="wave-bar animate-wave-4"></div>
            <div class="wave-bar animate-wave-3"></div>
            <div class="wave-bar animate-wave-2"></div>
            <div class="wave-bar animate-wave-1"></div>
        </div>

    </div>
</div>

<script>
    // ✅ CHEMINS PARFAITS : juste le nom du fichier
    const audioFiles = {
        en: "voice_en.mp3",
        fr: "voice_fr.mp3",
        es: "voice_es.mp3",
        it: "voice_it.mp3"
    };

    let currentAudio = null;
    const waveContainer = document.getElementById('waveVisualizer');

    function playAudio(lang) {
        // Arrête l'audio précédent
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        // Lance le bon fichier audio
        currentAudio = new Audio(audioFiles[lang]);
        currentAudio.play();

        // Active l'animation des ondes
        waveContainer.style.opacity = "1";

        // Quand c'est fini, on arrête l'animation
        currentAudio.onended = function() {
            waveContainer.style.opacity = "0.3";
        };
    }

    // Initialisation : ondes au repos
    window.onload = function() {
        waveContainer.style.opacity = "0.3";
    };
</script>

</body>
</html>
