<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlaraPure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background-color: #87CEEB;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- LES PAGES --- */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1.5s ease-in-out;
        }

        #page1 {
            background-image: url('./src/assets/page1.png');
            z-index: 3;
        }

        #page2 {
            background-image: url('./src/assets/page2.png');
            z-index: 1;
            opacity: 0;
        }

        .hidden { 
            opacity: 0 !important; 
            pointer-events: none; 
        }

        .visible { 
            opacity: 1 !important; 
            pointer-events: all; 
        }

        /* --- LES VAGUES SONORES --- */
        #audio-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 120px;
            display: none;
            z-index: 10;
        }

        .bar {
            position: absolute;
            bottom: 50%;
            background: #87CEEB;
            border-radius: 2px;
            box-shadow: 0 0 8px #87CEEB, 0 0 15px rgba(135, 206, 235, 0.5);
            width: 3px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- PAGE D'ACCUEIL -->
    <div id="page1" class="page"></div>

    <!-- PAGE INTERFACE -->
    <div id="page2" class="page">
        <div id="audio-wave"></div>
    </div>
</div>

<script>
    // Création des barres
    const waveContainer = document.getElementById('audio-wave');
    const nbBars = 120;
    const espace = 6;

    for(let i=0; i < nbBars; i++) {
        const bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.left = `${i * espace}px`;
        bar.style.height = '2px';
        waveContainer.appendChild(bar);
    }
    const bars = document.querySelectorAll('.bar');

    // Animation DOUCE
    function animateWaves() {
        bars.forEach((bar, index) => {
            const height = Math.sin((Date.now() / 1000) + index * 0.4) * 35 + Math.random() * 8;
            bar.style.height = `${Math.abs(height) + 3}px`;
        });
        requestAnimationFrame(animateWaves);
    }

    // Fichiers audio
    const audioFiles = {
        en: "./voice_en.mp3",
        fr: "./voice_fr.mp3",
        es: "./voice_es.mp3",
        it: "./voice_it.mp3"
    };

    let currentAudio = null;

    // Fonction appelée quand on clique sur l'image
    function startApp(lang) {
        console.log("Demarrage en : " + lang);
        
        document.getElementById('page1').classList.add('hidden');
        document.getElementById('page2').classList.add('visible');
        document.getElementById('audio-wave').style.display = 'block';
        animateWaves();

        if(currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }
        currentAudio = new Audio(audioFiles[lang]);
        currentAudio.play();

        currentAudio.onended = function() {
            document.getElementById('audio-wave').style.display = 'none';
        };
    }

    // IMPORTANT : On rend l'image cliquable
    document.getElementById('page1').addEventListener('click', function() {
        // Par défaut on lance FR si on clique n'importe où, 
        // mais normalement tes boutons dans l'image appellent startApp('fr') etc.
        startApp('fr');
    });

</script>

</body>
</html>
