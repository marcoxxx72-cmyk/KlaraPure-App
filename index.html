<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Klara</title>
    <style>
        body {
            background-color: #E0F7FA; /* Bleu très clair */
            color: #2C4E64;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #F0F8FF;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(44, 78, 100, 0.1);
            text-align: center;
        }
        button {
            background-color: #8ECAE6;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #90E0EF;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bonjour, je suis Klara</h1>
    <p>Cliquez sur une langue pour m'entendre :</p>

    <button onclick="playAudio('en')">🇬🇧 English</button>
    <button onclick="playAudio('fr')">🇫🇷 Français</button>
    <button onclick="playAudio('es')">🇪🇸 Español</button>
    <button onclick="playAudio('it')">🇮🇹 Italiano</button>
</div>

<script>
    function playAudio(lang) {
        let audioFile;
        
        switch(lang) {
            case 'fr':
                audioFile = 'voice_fr.mp3'; // <-- NOM CORRECT
                break;
            case 'es':
                audioFile = 'voice_es.mp3'; // <-- NOM CORRECT
                break;
            case 'it':
                audioFile = 'voice_it.mp3'; // <-- NOM CORRECT
                break;
            default:
                audioFile = 'voice_en.mp3'; // <-- NOM CORRECT
        }

        const audio = new Audio(audioFile);
        audio.play();
    }
</script>

</body>
</html>
