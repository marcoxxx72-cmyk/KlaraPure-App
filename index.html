<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Klara Pure ©</title>
    <style>
        body { 
            background-color: #E0F7FA; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        /* --- IMAGE PRINCIPALE --- */
        #interface {
            width: 100%;
            max-width: 500px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

    </style>
</head>
<body>

    <!-- L'IMAGE QUI VA S'AFFICHER -->
    <img id="interface" src="page1.png" alt="Klara Pure">

<script>

// ==========================================
// KLARA PURE © - VOICE SYSTEM
// ==========================================

// --- FICHIERS AUDIO ET IMAGES ---
const mediaFiles = {
    en: { audio: "voice_en.mp3", image: "page3.png" },
    fr: { audio: "voice_fr.mp3", image: "page3.png" },
    es: { audio: "voice_es.mp3", image: "page3.png" },
    it: { audio: "voice_it.mp3", image: "page3.png" }
};

const imageElement = document.getElementById('interface');
let currentAudio = null;
let isPlaying = false;

// Quand on clique sur l'image
imageElement.addEventListener('click', function() {
    speakKlara('fr');
});

function speakKlara(langKey) {

    if (isPlaying) {
        if(currentAudio) currentAudio.pause();
        imageElement.src = "page2.png";
        isPlaying = false;
        return;
    }

    let media = mediaFiles[langKey];
    console.log("▶️  Playing: " + media.audio);

    try {
        // Change l'image pour l'animation
        imageElement.src = media.image;

        currentAudio = new Audio(media.audio);
        isPlaying = true;

        currentAudio.onended = function () {
            isPlaying = false;
            imageElement.src = "page2.png";
            currentAudio = null;
        };

        currentAudio.onerror = function () {
            console.error("❌ ERREUR: Fichier introuvable -> " + media.audio);
            isPlaying = false;
            imageElement.src = "page2.png";
        };

        currentAudio.play();

    } catch (error) {
        console.error("❌ Erreur: ", error);
    }
}

// Quand la page est chargée
window.onload = function() {
    imageElement.src = "page1.png";
};

</script>

</body>
</html>
