<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klara Pure Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }

        /* ON AFFICHE JUSTE TON IMAGE SANS RIEN D'AUTRE */
        .interface-container {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background-image: url('src/assets/page1.png');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* ZONES DE CLIC INVISIBLES SUR LES BOUTONS DE L'IMAGE */
        .click-area {
            position: absolute;
            top: 54%;
            width: 85px;
            height: 42px;
            cursor: pointer;
            background: transparent;
        }
        #area-en { left: 18%; }
        #area-fr { left: 34%; }
        #area-es { left: 50%; }
        #area-it { left: 66%; }

        /* --- STYLES DES ONDES --- */
        .wave-container {
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 60px;
            transition: opacity 0.3s ease;
        }

        .wave-bar {
            width: 5px;
            background: #87CEEB;
            border-radius: 3px;
            opacity: 0.8;
        }

        .animate-wave-1 { animation: wave 1.2s infinite ease-in-out; }
        .animate-wave-2 { animation: wave 1.3s infinite ease-in-out; }
        .animate-wave-3 { animation: wave 1.1s infinite ease-in-out; }
        .animate-wave-4 { animation: wave 1.4s infinite ease-in-out; }
        .animate-wave-5 { animation: wave 1.0s infinite ease-in-out; }
        .animate-wave-6 { animation: wave 1.5s infinite ease-in-out; }
        .animate-wave-7 { animation: wave 0.9s infinite ease-in-out; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.2); }
            50% { transform: scaleY(1); }
        }
    </style>
</head>
<body>

<div class="interface-container">

    <!-- ZONES INVISIBLES POUR LE CLIC -->
    <div id="area-en" class="click-area" onclick="playAudio('en')"></div>
    <div id="area-fr" class="click-area" onclick="playAudio('fr')"></div>
    <div id="area-es" class="click-area" onclick="playAudio('es')"></div>
    <div id="area-it" class="click-area" onclick="playAudio('it')"></div>

    <!-- LES ONDES BLEUES -->
    <div class="wave-container" id="waveVisualizer">
        <div class="wave-bar animate-wave-1"></div>
        <div class="wave-bar animate-wave-2"></div>
        <div class="wave-bar animate-wave-3"></div>
        <div class="wave-bar animate-wave-4"></div>
        <div class="wave-bar animate-wave-5"></div>
        <div class="wave-bar animate-wave-6"></div>
        <div class="wave-bar animate-wave-7"></div>
        <div class="wave-bar animate-wave-5"></div>
        <div class="wave-bar animate-wave-4"></div>
        <div class="wave-bar animate-wave-3"></div>
        <div class="wave-bar animate-wave-2"></div>
        <div class="wave-bar animate-wave-1"></div>
    </div>

</div>

<script>
    const audioFiles = {
        en: "voice_en.mp3",
        fr: "voice_fr.mp3",
        es: "voice_es.mp3",
        it: "voice_it.mp3"
    };

    let currentAudio = null;
    const waveContainer = document.getElementById('waveVisualizer');

    function playAudio(lang) {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }
        currentAudio = new Audio(audioFiles[lang]);
        currentAudio.play();
        waveContainer.style.opacity = "1";
        currentAudio.onended = function() {
            waveContainer.style.opacity = "0.3";
        };
    }

    window.onload = function() {
        waveContainer.style.opacity = "0.3";
    };
</script>

</body>
</html>
