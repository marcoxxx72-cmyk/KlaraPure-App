<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlaraPure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { overflow: hidden; background-color: #87CEEB; }

        .container { position: relative; width: 100vw; height: 100vh; }

        #page1 {
            position: absolute; width: 100%; height: 100%;
            background-image: url('./src/assets/page1.png');
            background-size: cover; background-position: center;
            z-index: 3; transition: opacity 1.5s ease-in-out;
        }

        #page2 {
            position: absolute; width: 100%; height: 100%;
            background-image: url('./src/assets/page2.png');
            background-size: cover; background-position: center;
            z-index: 1; opacity: 0;
            transition: opacity 1.5s ease-in-out;
            pointer-events: none;
        }

        #page2.visible { opacity: 1; pointer-events: all; }
        #page1.hidden  { opacity: 0; pointer-events: none; }

        #wave-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 320px;
            display: none; z-index: 10;
        }

        #wave-svg { width: 100%; height: 100%; overflow: visible; }

        .wave-glow { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 18; opacity: 0.07; }
        .wave-mid  { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 6;  opacity: 0.28; }
        .wave-main { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.2; opacity: 0.90; }
    </style>
</head>
<body>

<div class="container">
    <div id="page1"></div>
    <div id="page2">
        <div id="wave-container">
            <svg id="wave-svg" viewBox="0 0 1400 320" preserveAspectRatio="none">
                <path id="wg" class="wave-glow" d=""></path>
                <path id="wm" class="wave-mid"  d=""></path>
                <path id="wl" class="wave-main" d=""></path>
            </svg>
        </div>
    </div>
</div>

<script>
    const wg            = document.getElementById('wg');
    const wm            = document.getElementById('wm');
    const wl            = document.getElementById('wl');
    const page1         = document.getElementById('page1');
    const page2         = document.getElementById('page2');
    const waveContainer = document.getElementById('wave-container');

    const W      = 1400;
    const H      = 320;
    const CENTER = H / 2;

    let breathAmp    = 0;
    let breathTarget = 0.4;
    let animationId  = null;
    let breathTimer  = null;
    let hasStarted   = false;

    const BLUE = 'rgb(100, 180, 230)';

    function buildWavePath(time) {
        const t   = time * 0.001;
        const amp = 18 + breathAmp * 72;

        const wave1 = (x) => Math.sin(x * 0.0045 + t * 0.38) * amp;
        const wave2 = (x) => Math.sin(x * 0.011  + t * 0.72) * (amp * 0.42);
        const wave3 = (x) => Math.sin(x * 0.024  + t * 1.10) * (amp * 0.18);

        const STEPS = 280;
        let d = '';
        for (let i = 0; i <= STEPS; i++) {
            const x = (i / STEPS) * W;
            const y = CENTER + wave1(x) + wave2(x) + wave3(x);
            d += (i === 0
                ? `M ${x.toFixed(1)} ${y.toFixed(1)}`
                : ` L ${x.toFixed(1)} ${y.toFixed(1)}`);
        }
        return d;
    }

    function drawFrame() {
        const now  = Date.now();
        const path = buildWavePath(now);

        wg.setAttribute('d', path);  wg.setAttribute('stroke', BLUE);
        wm.setAttribute('d', path);  wm.setAttribute('stroke', BLUE);
        wl.setAttribute('d', path);  wl.setAttribute('stroke', BLUE);

        breathAmp += (breathTarget - breathAmp) * 0.025;
        animationId = requestAnimationFrame(drawFrame);
    }

    function breathCycle() {
        breathTarget = 0.08 + Math.random() * 0.80;
        breathTimer  = setTimeout(breathCycle, 700 + Math.random() * 1100);
    }

    function stopAnimation() {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        if (breathTimer) { clearTimeout(breathTimer); breathTimer = null; }
        waveContainer.style.transition = 'opacity 1.2s ease';
        waveContainer.style.opacity    = '0';
        setTimeout(() => {
            waveContainer.style.display    = 'none';
            waveContainer.style.opacity    = '1';
            waveContainer.style.transition = '';
        }, 1200);
    }

    const audioFiles = {
        en: './audio/voice_en.mp3',
        fr: './audio/voice_fr.mp3',
        es: './audio/voice_es.mp3',
        it: './audio/voice_it.mp3'
    };

    let currentAudio = null;

    function startApp(lang) {
        if (hasStarted) return;
        hasStarted = true;

        console.log('Langue :', lang);

        page1.classList.add('hidden');
        page2.classList.add('visible');
        waveContainer.style.display = 'block';

        drawFrame();
        breathCycle();

        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }

        currentAudio = new Audio(audioFiles[lang]);
        currentAudio.onerror = () => console.error('Audio introuvable :', audioFiles[lang]);
        currentAudio.onended = () => stopAnimation();
        currentAudio.play().catch(err => console.warn('Autoplay bloqué :', err));
    }

    page1.addEventListener('click', function(e) {
        const x = e.clientX, w = window.innerWidth;
        if      (x < w * 0.25) { startApp('en'); }
        else if (x < w * 0.50) { startApp('fr'); }
        else if (x < w * 0.75) { startApp('es'); }
        else                   { startApp('it'); }
    });
</script>

</body>
</html>
