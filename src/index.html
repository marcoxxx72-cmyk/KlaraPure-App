<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Klara Pure ©</title>
    <style>
        body { 
            background-color: #E0F7FA; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        
        #interface {
            width: 500px;
            height: 500px;
            cursor: pointer;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
    </style>
</head>
<body>

    <div id="interface" onclick="speakKlara('fr')"></div>

<script>

const mediaFiles = {
    en: { audio: "voice_en.mp3", image: "url(assets/page3.png)" },
    fr: { audio: "voice_fr.mp3", image: "url(assets/page3.png)" },
    es: { audio: "voice_es.mp3", image: "url(assets/page3.png)" },
    it: { audio: "voice_it.mp3", image: "url(assets/page3.png)" }
};

const ui = document.getElementById('interface');
let currentAudio = null;
let isPlaying = false;

window.onload = function() {
    ui.style.backgroundImage = "url(assets/page1.png)";
};

function speakKlara(langKey) {

    if (isPlaying) {
        if(currentAudio) currentAudio.pause();
        ui.style.backgroundImage = "url(assets/page2.png)";
        isPlaying = false;
        return;
    }

    let media = mediaFiles[langKey];
    currentAudio = new Audio(media.audio);
    isPlaying = true;
    ui.style.backgroundImage = media.image;

    currentAudio.onended = function () {
        isPlaying = false;
        ui.style.backgroundImage = "url(assets/page2.png)";
        currentAudio = null;
    };

    currentAudio.play();
}

</script>

</body>
</html>
